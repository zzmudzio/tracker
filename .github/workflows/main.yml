name: Release

on:
  push:
    tags:
      - '*.*.*'   # tylko tagi w stylu 1.3.0, v2.0.1 itd.
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Setup JDK
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣ Build Maven project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4️⃣ Log in to Docker registry
      - name: Log in to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Rename .jar
        run: |
          JAR=$(ls ./target/tracker-*.jar | grep -v original | head -n 1)
          mv "$JAR" ./target/tracker.jar
          TAG=${JAR%.jar}
          echo "DOCKER_TAG=$TAG" >> $GITHUB_ENV

      # 5️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t $DOCKER_TAG .

      # 6️⃣ Push Docker image
      - name: Push Docker image
        run: docker push zzmudzio/$DOCKER_TAG
